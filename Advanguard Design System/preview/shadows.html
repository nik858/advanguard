<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Shadows & Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 32px; background: rgb(251,251,251); display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px 22px; }
  .tile { background: #fff; border-radius: 10px; padding: 18px 16px 14px; min-height: 80px; }
  .name { font: 700 13px/1.2 var(--font-body); }
  .val { font: 500 11px/1.3 ui-monospace, "SF Mono", Menlo, monospace; color: var(--color-text-muted); margin-top: 4px; }
  .cta { background: var(--color-brand-blue-2); color: #fff; box-shadow: 0 1px 0 var(--color-brand-blue-deep); text-align: center; font: 700 14px/1 var(--font-body); padding: 14px; border-radius: 8px; }
</style>
</head>
<body>
  <div class="tile" style="box-shadow: var(--shadow-header)">
    <div class="name">Header</div>
    <div class="val">0 4px 4px rgba(0,0,0,.1)</div>
  </div>
  <div class="tile" style="box-shadow: var(--shadow-card)">
    <div class="name">Card</div>
    <div class="val">0 4px 13px rgba(0,0,0,.1)</div>
  </div>
  <div class="tile" style="box-shadow: var(--shadow-card-soft)">
    <div class="name">Card · soft</div>
    <div class="val">0 4px 12px rgba(0,0,0,.1)</div>
  </div>
  <div class="tile" style="box-shadow: var(--shadow-product)">
    <div class="name">Product · stack</div>
    <div class="val">0 7.9px 19px rgba(0,0,0,.12)</div>
  </div>
  <div class="tile" style="box-shadow: var(--shadow-demo)">
    <div class="name">Demo video</div>
    <div class="val">0 0 44px rgba(0,0,0,.2)</div>
  </div>
  <div class="cta">CTA · shadow‑cta · 0 1px 0 deep‑blue</div>
</body>
</html>
