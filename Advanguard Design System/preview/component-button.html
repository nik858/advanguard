<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Buttons · Primary CTA</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 28px; background: #fff; display: grid; gap: 18px; }
  .btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px;
    width: 100%; max-width: 560px;
    border-radius: 8px; padding: 18px 24px;
    background: rgba(28,127,255,0.9255);
    color: #fff;
    border: 0;
    box-shadow: 0 1px 0 var(--color-brand-blue-deep);
    cursor: pointer;
    font-family: var(--font-body);
    transition: filter 150ms, transform 100ms, box-shadow 100ms;
  }
  .btn:hover { filter: brightness(1.05); }
  .btn:active { transform: translateY(1px); box-shadow: 0 0 0 var(--color-brand-blue-deep); }
  .btn .label { font: 700 24px/1.2 var(--font-body); display: flex; align-items: center; gap: 14px; }
  .btn .tag { font: 500 14px/1.4 var(--font-body); opacity: 0.7; }
  .arrow {
    width: 38px; height: 38px; border-radius: 7px; background: #fff;
    display: grid; place-items: center;
    box-shadow: 0 2px 2px rgba(0,0,0,0.08);
    color: var(--color-brand-blue-2);
    font-size: 22px;
    line-height: 0;
  }
  .small { max-width: 320px; padding: 14px 20px; }
  .small .label { font-size: 18px; }
  .small .arrow { width: 28px; height: 28px; font-size: 16px; }
  .meta { font: 500 11px/1.2 ui-monospace, "SF Mono", Menlo, monospace; color: var(--color-text-muted); }
</style>
</head>
<body>
  <div>
    <button class="btn"><span class="tag">Get Your eBook Now!</span><span class="label">Download Now for only $27.00 <span class="arrow">→</span></span></button>
    <div class="meta" style="margin-top:8px">Primary CTA · 8px radius · 1px deep‑blue hard shadow · white arrow chip</div>
  </div>
  <div>
    <button class="btn small"><span class="tag">Get Your eBook Now!</span><span class="label">Go to step #2 <span class="arrow">→</span></span></button>
    <div class="meta" style="margin-top:8px">Compact (in‑form) variant</div>
  </div>
</body>
</html>
