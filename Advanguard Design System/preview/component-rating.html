<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Rating Stars</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 28px; background: #fff; display: flex; gap: 28px; align-items: center; }
  .rating { display: flex; align-items: center; gap: 8px; }
  .stars { display: flex; gap: 2px; }
  .stars svg { width: 22px; height: 22px; }
  .label { font: 500 16px/1.1 var(--font-rating); color: var(--color-text-secondary); opacity: 0.9; }
</style>
</head>
<body>
  <div class="rating">
    <span class="label">Excellent based on 456 reviews</span>
    <span class="stars" aria-label="5 out of 5">
      <svg viewBox="0 0 24 24" fill="rgb(56,210,90)" xmlns="http://www.w3.org/2000/svg"><path d="M12 17.3 5.82 21l1.64-7.03L2 9.24l7.19-.61L12 2l2.81 6.63 7.19.61-5.46 4.73L18.18 21z"/></svg>
      <svg viewBox="0 0 24 24" fill="rgb(56,210,90)" xmlns="http://www.w3.org/2000/svg"><path d="M12 17.3 5.82 21l1.64-7.03L2 9.24l7.19-.61L12 2l2.81 6.63 7.19.61-5.46 4.73L18.18 21z"/></svg>
      <svg viewBox="0 0 24 24" fill="rgb(56,210,90)" xmlns="http://www.w3.org/2000/svg"><path d="M12 17.3 5.82 21l1.64-7.03L2 9.24l7.19-.61L12 2l2.81 6.63 7.19.61-5.46 4.73L18.18 21z"/></svg>
      <svg viewBox="0 0 24 24" fill="rgb(56,210,90)" xmlns="http://www.w3.org/2000/svg"><path d="M12 17.3 5.82 21l1.64-7.03L2 9.24l7.19-.61L12 2l2.81 6.63 7.19.61-5.46 4.73L18.18 21z"/></svg>
      <svg viewBox="0 0 24 24" fill="rgb(56,210,90)" xmlns="http://www.w3.org/2000/svg"><path d="M12 17.3 5.82 21l1.64-7.03L2 9.24l7.19-.61L12 2l2.81 6.63 7.19.61-5.46 4.73L18.18 21z"/></svg>
    </span>
  </div>
</body>
</html>
