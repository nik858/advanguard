<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Color · Brand</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 24px; background: #fff; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .swatch { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 64px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.06); }
  .name { font: 700 13px/1.2 var(--font-body); color: var(--color-text-primary); }
  .val { font: 500 11px/1.2 ui-monospace, "SF Mono", Menlo, monospace; color: var(--color-text-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="swatch">
      <div class="chip" style="background: rgb(28,127,255)"></div>
      <div class="name">Trust Blue</div>
      <div class="val">rgb(28, 127, 255)</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background: rgb(28,123,253)"></div>
      <div class="name">Trust Blue Alt</div>
      <div class="val">rgb(28, 123, 253)</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background: rgb(25,69,224)"></div>
      <div class="name">Deep Blue</div>
      <div class="val">rgb(25, 69, 224)</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background: linear-gradient(rgb(0,108,255), rgb(36,137,255))"></div>
      <div class="name">Book Cover Grad</div>
      <div class="val">#006CFF → #2489FF</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background: rgb(238,240,255); border: 1px solid rgba(0,0,0,0.08)"></div>
      <div class="name">Blue Soft</div>
      <div class="val">rgb(238, 240, 255)</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background: rgba(28,127,255,0.3)"></div>
      <div class="name">Marker Highlight</div>
      <div class="val">rgba(28,127,255,0.3)</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background: rgba(28,127,255,0.2)"></div>
      <div class="name">Blue Tint</div>
      <div class="val">rgba(28,127,255,0.2)</div>
    </div>
    <div class="swatch">
      <div class="chip" style="background: rgb(252,252,255); border: 1px solid rgba(0,0,0,0.08)"></div>
      <div class="name">Alt Section BG</div>
      <div class="val">rgb(252, 252, 255)</div>
    </div>
  </div>
</body>
</html>
