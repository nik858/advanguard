<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 28px; background: #fff; display: grid; gap: 12px; max-width: 420px; }
  .input {
    width: 100%; box-sizing: border-box;
    background: #fff;
    border: 1px solid rgb(216,216,217);
    border-radius: 8px;
    box-shadow: inset 0 2px 2px rgba(0,0,0,0.1);
    padding: 14px 20px;
    font: 400 18px/1.4 var(--font-body);
    color: var(--color-text-primary);
  }
  .input::placeholder { color: rgb(109,109,109); opacity: 0.9; }
  .input:focus { outline: 2px solid rgba(28,127,255,0.4); outline-offset: 0; }
  .meta { font: 500 11px/1.2 ui-monospace, "SF Mono", Menlo, monospace; color: var(--color-text-muted); }
</style>
</head>
<body>
  <input class="input" placeholder="Enter your email" />
  <input class="input" placeholder="Phone number (for bonuses)" />
  <div class="meta">Input · 8px radius · 1px border rgb(216,216,217) · inset shadow 0 2px 2px / 10% — focus = blue tint ring</div>
</body>
</html>
