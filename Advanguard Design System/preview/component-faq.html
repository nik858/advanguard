<!doctype html>
<html lang="en">
<head>

<title>FAQ Item</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 28px; background: #fff; max-width: 520px; }
  .row { display: grid; gap: 16px; }
  .q { display: flex; align-items: center; gap: 8px; }
  .icon {
    width: 32px; height: 32px;
    display: grid; place-items: center;
  }
  .icon svg { width: 26px; height: 26px; color: rgb(44,36,36); }
  .qtext { font: 700 24px/1.1 var(--font-body); color: var(--color-text-primary); opacity: 0.9; }
  .a { font: 400 18px/1.4 var(--font-body); color: var(--color-text-primary); opacity: 0.8; }
</style>
</head>
<body>
  <div class="row">
    <div class="q">
      <span class="icon">
        <svg viewBox="0 0 256 256" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M128 24a104 104 0 1 0 104 104A104.12 104.12 0 0 0 128 24m0 192a88 88 0 1 1 88-88 88.1 88.1 0 0 1-88 88m12-60a12 12 0 1 1-12-12 12 12 0 0 1 12 12m36-72c0 22.06-20 32-32 32a8 8 0 0 1-8-8c0-9.66 10.34-16 16-16a16 16 0 1 0-16-16 8 8 0 0 1-16 0 32 32 0 1 1 64 8Z"/></svg>
      </span>
      <span class="qtext">Who is this for?</span>
    </div>
    <p class="a" style="margin:0">This is for anyone who wants to acquire more customers, automatically. Coaches, consultants, agency owners, artists, professional service providers, influencers, freelancers, content creators.</p>
  </div>
</body>
</html>
