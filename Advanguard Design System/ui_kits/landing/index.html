<!-- Admin editor (Babel JSX) -->
<script type="text/babel" data-presets="react" src="admin.jsx"></script>

<!-- App entry -->
<script type="text/babel" data-presets="react">
  (function () {
    function App() {
      const onCheckout = () => {
        const order = document.querySelector(".ac-order");
        if (order) order.scrollIntoView({ behavior: "smooth", block: "start" });
      };
      return (
        <window.ContentProvider>
          <window.Header />
          <main id="main">
            <window.Headline />
            <window.Hero onCheckout={onCheckout} />
            <window.LogoStrip />
            <window.OnlySystem onCheckout={onCheckout} />
            <window.Demo />
            <window.Testimonials />
            <window.Stack onCheckout={onCheckout} />
            <window.GuaranteeSection />
            <window.FAQ />
          </main>
          <window.Footer onCheckout={onCheckout} />
          <window.AdminEditor />
        </window.ContentProvider>
      );
    }
    function mount() {
      if (!window.ContentProvider || !window.Header || !window.AdminEditor) {
        // Babel scripts still transpiling — retry shortly.
        return setTimeout(mount, 30);
      }
      ReactDOM.createRoot(document.getElementById("ac-root")).render(<App />);
      // Update document meta from content
      const meta = window.AC.content.meta;
      if (meta && meta.title) document.title = meta.title;
    }
    mount();
  })();
</script>
