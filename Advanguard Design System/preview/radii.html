<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 24px; background: #fff; display: flex; gap: 18px; align-items: flex-end; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 88px; height: 64px; background: var(--color-brand-blue); }
  .name { font: 700 12px/1 var(--font-body); }
  .val { font: 500 11px/1 ui-monospace, "SF Mono", Menlo, monospace; color: var(--color-text-muted); }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius: 2px"></div><div class="name">xs</div><div class="val">2px · paper</div></div>
  <div class="item"><div class="box" style="border-radius: 4px"></div><div class="name">sm</div><div class="val">4px · book</div></div>
  <div class="item"><div class="box" style="border-radius: 6px"></div><div class="name">md</div><div class="val">6px · pill</div></div>
  <div class="item"><div class="box" style="border-radius: 8px"></div><div class="name">lg</div><div class="val">8px · button</div></div>
  <div class="item"><div class="box" style="border-radius: 10px"></div><div class="name">xl</div><div class="val">10px · card</div></div>
  <div class="item"><div class="box" style="border-radius: 50%; width: 64px"></div><div class="name">full</div><div class="val">50% · avatar</div></div>
</body>
</html>
