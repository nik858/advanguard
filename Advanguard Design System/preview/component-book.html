<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Book Cover</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { padding: 22px; background: rgb(251,251,251); }
  .book {
    position: relative; width: 280px; height: 392px;
    border-radius: 4px; overflow: hidden;
    background: linear-gradient(rgb(0,108,255) 0%, rgb(36,137,255) 100%);
    box-shadow: 0 12px 30px rgba(0,0,0,0.18);
  }
  .binding {
    position: absolute; left: 0; top: 0; bottom: 0; width: 16px;
    background: linear-gradient(rgba(0,0,0,0.25), rgba(114,114,114,0.14), rgba(255,255,255,0.12), rgba(255,255,255,0.1), rgba(0,0,0,0.3), rgba(0,0,0,0.0001));
  }
  .title {
    position: absolute; left: 0; right: 0; top: 38px;
    font: 800 42px/0.9 var(--font-body);
    color: #fff;
    letter-spacing: -0.05em;
    text-align: center;
  }
  .quote {
    position: absolute; left: 16px; right: 16px; bottom: 32px;
    display: flex; flex-direction: column; gap: 4px; align-items: center;
  }
  .quote span {
    display: inline-block;
    background: #fff; color: var(--color-brand-blue-2);
    font: 700 14px/1.3 var(--font-body);
    padding: 3px 10px; border-radius: 2px;
  }
  .bolt {
    position: absolute; left: 50%; top: 92px; transform: translateX(-50%);
    width: 36px; height: 36px;
    background: #fff; border-radius: 50%;
    display: grid; place-items: center; color: var(--color-brand-blue-2);
    font-size: 22px;
  }
  .placeholder {
    position: absolute; left: 50%; top: 175px; transform: translateX(-50%);
    width: 110px; height: 110px; opacity: 0.15; color: #000;
    display: grid; place-items: center;
  }
</style>
</head>
<body>
  <div class="book">
    <div class="title">Automatic<br>Clients</div>
    <div class="bolt">⚡</div>
    <div class="placeholder">
      <svg viewBox="0 0 24 24" width="100%" height="100%" fill="currentColor"><path d="M21 5v14H3V5h18m0-2H3a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2m-5 5.5a1.5 1.5 0 1 0 1.5 1.5 1.5 1.5 0 0 0-1.5-1.5M5 17l3.5-4.5 2.5 3 3.5-4.5L19 17H5"/></svg>
    </div>
    <div class="quote">
      <span>Copy &amp; paste automated process</span>
      <span>that allows you to acquire</span>
      <span>customers for free</span>
    </div>
    <div class="binding"></div>
  </div>
</body>
</html>
